<!doctype html>
<html lang="he" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>הזמנה לחלאקה | אבישי</title>
  <meta name="description" content="הזמנה לחלאקה של אבישי - קבר רשב״י, י״ג סיוון" />
  <meta property="og:title" content="הזמנה לחלאקה של אבישי" />
  <meta property="og:description" content="בשמחה רבה אנו מזמינים אתכם לחגוג איתנו את החלאקה של אבישי" />
  <meta property="og:image" content="assets/avishai.JPG" />
  <link rel="icon"
    href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50' x='12' font-size='48'>✂️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;700&family=Rubik:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --rose: #e8a0b4;
      --rose-light: #f5d5de;
      --rose-pale: #fdf0f3;
      --cream: #fef9f4;
      --gold: #c4975a;
      --gold-light: #e8c992;
      --brown-warm: #8b6342;
      --text: #3d2b1f;
      --text-soft: #6b5244;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Heebo", "Rubik", "Segoe UI", system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Falling petals --- */
    .petals-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      width: 18px;
      height: 18px;
      background: var(--rose-light);
      border-radius: 50% 0 50% 50%;
      opacity: 0;
      animation: fall linear infinite;
    }

    .petal:nth-child(odd) {
      background: var(--rose);
      width: 15px;
      height: 15px;
    }

    .petal:nth-child(3n) {
      background: var(--gold-light);
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .petal:nth-child(5n) {
      width: 22px;
      height: 22px;
      background: rgba(245, 213, 222, 0.9);
    }

    @keyframes fall {
      0% {
        opacity: 0;
        transform: translateY(-30px) rotate(0deg) translateX(0);
      }
      8% { opacity: 0.85; }
      50% { transform: translateY(50vh) rotate(180deg) translateX(30px); }
      92% { opacity: 0.6; }
      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(360deg) translateX(-20px);
      }
    }

    /* --- Sparkles --- */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkleFloat ease-in-out infinite, sparklePulse ease-in-out infinite;
    }

    @keyframes sparkleFloat {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-12px) translateX(8px); }
      50% { transform: translateY(-6px) translateX(-6px); }
      75% { transform: translateY(-18px) translateX(4px); }
    }

    @keyframes sparklePulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* --- Three-column layout --- */
    .invitation {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 3fr 4fr 3fr;
      min-height: 100vh;
      animation: cardIn 1s ease-out both;
    }

    .photo-col {
      overflow: hidden;
      position: relative;
    }

    .photo-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-col::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .photo-right::after {
      background: linear-gradient(to left, rgba(255, 251, 247, 0.4) 0%, transparent 60%);
    }

    .photo-left::after {
      background: linear-gradient(to right, rgba(255, 251, 247, 0.4) 0%, transparent 60%);
    }

    .photo-right img {
      object-position: center 15%;
    }

    .photo-left img {
      object-position: center 30%;
    }

    .content {
      background: linear-gradient(170deg, #fffbf7 0%, #fff5ee 40%, var(--rose-pale) 100%);
      padding: 40px 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-left: 1.5px solid rgba(232, 160, 180, 0.2);
      border-right: 1.5px solid rgba(232, 160, 180, 0.2);
    }

    .content::before,
    .content::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .content::before {
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, var(--rose-light) 0%, transparent 70%);
      top: -80px;
      right: -60px;
      opacity: 0.35;
      animation: glow 6s ease-in-out infinite alternate;
    }

    .content::after {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, var(--gold-light) 0%, transparent 70%);
      bottom: -60px;
      left: -50px;
      opacity: 0.3;
      animation: glow 6s ease-in-out 3s infinite alternate;
    }

    @keyframes glow {
      from { opacity: 0.25; transform: scale(1); }
      to { opacity: 0.5; transform: scale(1.2); }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* --- Content elements --- */
    .bsd {
      font-family: "Frank Ruhl Libre", serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-bottom: 18px;
      animation: fadeIn 1.2s ease-out 0.3s both;
    }

    .event-title {
      font-family: "Frank Ruhl Libre", serif;
      font-size: 2.6rem;
      font-weight: 900;
      margin-bottom: 4px;
      animation: fadeIn 1.2s ease-out 0.5s both;
      line-height: 1.3;
      background: linear-gradient(135deg, var(--brown-warm), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .event-title .child-name {
      display: block;
      font-size: 3.2rem;
      font-weight: 900;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 16px 0 20px;
      animation: fadeIn 1.2s ease-out 0.6s both;
    }

    .ornament-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    }

    .ornament-icon {
      font-size: 1.1rem;
      color: var(--gold);
    }

    .details-box {
      background: rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(232, 160, 180, 0.2);
      animation: fadeIn 1.2s ease-out 0.7s both;
      backdrop-filter: blur(8px);
      width: 100%;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 0;
      font-size: 1.05rem;
      color: var(--text);
    }

    .detail-row + .detail-row {
      border-top: 1px solid rgba(232, 160, 180, 0.15);
    }

    .detail-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .detail-label {
      font-weight: 500;
    }

    .detail-value {
      font-weight: 300;
    }

    /* --- Countdown --- */
    .countdown {
      display: flex;
      direction: ltr;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
      animation: fadeIn 1.2s ease-out 0.8s both;
    }

    .countdown-unit {
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(232, 160, 180, 0.2);
      border-radius: 16px;
      padding: 14px 10px 10px;
      min-width: 64px;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(200, 140, 160, 0.1);
    }

    .countdown-number {
      font-family: "Frank Ruhl Libre", serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--brown-warm);
      line-height: 1.1;
      display: block;
    }

    .countdown-label {
      font-size: 0.78rem;
      color: var(--text-soft);
      font-weight: 400;
      margin-top: 4px;
      display: block;
    }

    .countdown-message {
      font-family: "Frank Ruhl Libre", serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      animation: fadeIn 0.6s ease-out both;
      margin-bottom: 24px;
    }

    .blessing {
      font-family: "Frank Ruhl Libre", serif;
      font-size: 1.5rem;
      color: var(--gold);
      font-weight: 700;
      line-height: 1.9;
      animation: fadeIn 1.2s ease-out 0.9s both;
      margin-bottom: 8px;
    }

    .footer-ornament {
      animation: fadeIn 1.2s ease-out 1s both;
    }

    .scissors {
      display: inline-block;
      font-size: 1.4rem;
      animation: snip 2s ease-in-out infinite;
      color: var(--gold);
    }

    @keyframes snip {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- Mobile photos row (hidden on desktop) --- */
    .mobile-photos {
      display: none;
    }

    /* --- Responsive --- */
    @media (max-width: 900px) {
      .invitation {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .photo-col {
        display: none;
      }

      .content {
        border: none;
        padding: 32px 24px 28px;
        min-height: auto;
      }

      .mobile-photos {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }

      .mobile-photos img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        display: block;
      }

      .mobile-photos .mobile-photo-right img {
        object-position: center 15%;
      }

      .mobile-photos .mobile-photo-left img {
        object-position: center 30%;
      }

      .event-title {
        font-size: 2.2rem;
      }

      .event-title .child-name {
        font-size: 2.6rem;
      }

      .countdown {
        gap: 10px;
      }

      .countdown-unit {
        min-width: 58px;
        padding: 10px 6px 8px;
      }

      .countdown-number {
        font-size: 1.6rem;
      }
    }

    @media (max-width: 480px) {
      .content {
        padding: 28px 18px 24px;
      }

      .event-title {
        font-size: 1.9rem;
      }

      .event-title .child-name {
        font-size: 2.2rem;
      }

      .mobile-photos img {
        height: 220px;
      }

      .countdown {
        gap: 8px;
      }

      .countdown-unit {
        min-width: 52px;
        padding: 8px 4px 6px;
        border-radius: 12px;
      }

      .countdown-number {
        font-size: 1.4rem;
      }

      .countdown-label {
        font-size: 0.7rem;
      }

      .detail-row {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="petals-bg" id="petals"></div>

  <div class="invitation">
    <div class="photo-col photo-right">
      <img src="assets/avishai.JPG" alt="אבישי" />
    </div>

    <div class="content">
      <div id="sparkles"></div>
      <div class="bsd">בס״ד</div>

      <h1 class="event-title">
        חלאקה של
        <span class="child-name">אבישי</span>
      </h1>

      <div class="ornament">
        <span class="ornament-line"></span>
        <span class="ornament-icon">❀</span>
        <span class="ornament-line"></span>
      </div>

      <div class="details-box">
        <div class="detail-row">
          <span class="detail-icon">📅</span>
          <span class="detail-label">יום שישי</span>
          <span class="detail-value">י״ג סיוון · 29 במאי</span>
        </div>
        <div class="detail-row">
          <span class="detail-icon">🕘</span>
          <span class="detail-label">שעה</span>
          <span class="detail-value">9:00</span>
        </div>
        <div class="detail-row">
          <span class="detail-icon">📍</span>
          <span class="detail-label">מיקום</span>
          <span class="detail-value">קבר רבי שמעון בר יוחאי · מירון</span>
        </div>
      </div>

      <div class="countdown" id="countdown">
        <div class="countdown-unit">
          <span class="countdown-number" id="cd-days">--</span>
          <span class="countdown-label">ימים</span>
        </div>
        <div class="countdown-unit">
          <span class="countdown-number" id="cd-hours">--</span>
          <span class="countdown-label">שעות</span>
        </div>
        <div class="countdown-unit">
          <span class="countdown-number" id="cd-minutes">--</span>
          <span class="countdown-label">דקות</span>
        </div>
        <div class="countdown-unit">
          <span class="countdown-number" id="cd-seconds">--</span>
          <span class="countdown-label">שניות</span>
        </div>
      </div>

      <p class="blessing">
        בואו לשמוח איתנו!
      </p>

      <div class="footer-ornament">
        <div class="ornament">
          <span class="ornament-line"></span>
          <span class="scissors">✂</span>
          <span class="ornament-line"></span>
        </div>
      </div>
    </div>

    <div class="photo-col photo-left">
      <img src="assets/avishai_2.JPG" alt="אבישי" />
    </div>
  </div>

  <!-- Mobile: photos below content -->
  <div class="mobile-photos">
    <div class="mobile-photo-right">
      <img src="assets/avishai.JPG" alt="אבישי" />
    </div>
    <div class="mobile-photo-left">
      <img src="assets/avishai_2.JPG" alt="אבישי" />
    </div>
  </div>

  <script>
    (function countdown() {
      const target = new Date(2026, 4, 29, 9, 0, 0).getTime();
      const container = document.getElementById("countdown");
      const els = {
        d: document.getElementById("cd-days"),
        h: document.getElementById("cd-hours"),
        m: document.getElementById("cd-minutes"),
        s: document.getElementById("cd-seconds"),
      };

      function tick() {
        const now = Date.now();
        const diff = target - now;

        if (diff <= 0) {
          container.innerHTML = '<div class="countdown-message">השמחה היום!</div>';
          return;
        }

        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        els.d.textContent = d;
        els.h.textContent = h;
        els.m.textContent = String(m).padStart(2, "0");
        els.s.textContent = String(s).padStart(2, "0");
      }

      tick();
      setInterval(tick, 1000);
    })();

    (function createPetals() {
      const container = document.getElementById("petals");
      for (let i = 0; i < 40; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petal.style.left = Math.random() * 100 + "%";
        petal.style.animationDuration = 5 + Math.random() * 7 + "s";
        petal.style.animationDelay = Math.random() * 12 + "s";
        container.appendChild(petal);
      }
    })();

    (function createSparkles() {
      const container = document.getElementById("sparkles");
      const colors = [
        "rgba(196, 151, 90, 0.8)",
        "rgba(232, 201, 146, 0.9)",
        "rgba(232, 160, 180, 0.7)",
        "rgba(245, 213, 222, 0.9)",
        "rgba(255, 255, 255, 0.9)",
      ];
      for (let i = 0; i < 18; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        const size = 4 + Math.random() * 6;
        s.style.width = size + "px";
        s.style.height = size + "px";
        s.style.left = 5 + Math.random() * 90 + "%";
        s.style.top = 5 + Math.random() * 90 + "%";
        s.style.background = colors[Math.floor(Math.random() * colors.length)];
        s.style.boxShadow = "0 0 " + (size + 4) + "px " + s.style.background;
        s.style.animationDuration =
          (3 + Math.random() * 4) + "s, " + (2 + Math.random() * 3) + "s";
        s.style.animationDelay =
          (Math.random() * 5) + "s, " + (Math.random() * 3) + "s";
        container.appendChild(s);
      }
    })();
  </script>
</body>

</html>
