<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Digital Frame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/frame.css" />
  </head>
  <body>
    <main class="wall">
      <div class="frame" aria-label="Digital photo frame">
        <div class="frame-outer">
          <div class="frame-inner">
            <div class="mat">
              <div class="photo-stage" id="photo-stage">
                <img class="slide slide-a" id="slide-a" alt="" />
                <img class="slide slide-b" id="slide-b" alt="" />
                <div class="drop-overlay" id="drop-overlay" hidden>Drop photos here</div>
                <div class="processing-state" id="processing-state" hidden>Converting photos…</div>
                <div class="empty-state" id="empty-state">
                  <p>Drop photos here</p>
                  <p class="hint" id="empty-hint">Images stay on this device only — nothing is uploaded.</p>
                  <p class="status-msg" id="status-msg" hidden></p>
                  <label for="file-input" class="btn" id="choose-photos">Choose photos</label>
                </div>
              </div>
              <div class="screen-controls">
                <button type="button" class="btn btn-small btn-muted" id="mode-toggle" title="Switch to night mode">
                  Night mode
                </button>
                <button type="button" class="btn btn-small btn-muted" id="enter-fullscreen" title="Full screen">
                  Full screen
                </button>
                <button type="button" class="btn btn-small btn-muted" id="exit-fullscreen" title="Exit full screen" hidden>
                  Exit
                </button>
              </div>
              <div class="toolbar" id="toolbar" hidden>
                <label for="file-input" class="btn btn-small" id="add-photos" title="Add photos">+</label>
                <button type="button" class="btn btn-small btn-muted" id="clear-photos" title="Clear all photos">Clear</button>
              </div>
              <div class="clock" id="clock" aria-live="polite">
                <div class="clock-time" id="clock-time">--:--</div>
                <div class="clock-date" id="clock-date">Loading…</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <input
      type="file"
      id="file-input"
      class="file-input-offscreen"
      accept="image/*,.heic,.heif"
      multiple
    />
    <script src="./js/config.js"></script>
    <script src="./js/slideshow.js"></script>
    <script src="./js/mode.js"></script>
    <script src="./js/photos.js"></script>
    <script src="./js/fullscreen.js"></script>
    <script src="./js/clock.js"></script>
  </body>
</html>
